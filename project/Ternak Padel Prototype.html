//                        options={[['#D97757', '#29261b', '#f6f4ef'],

//
// TweakRadio is the segmented control for 2–3 short options (auto-falls-back to

/* END USAGE */

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

Object.assign(window, {

<script type="text/babel">
// ===== inlined: prototype/app-core.jsx =====
// Ternak Padel prototype — theme + shared UI atoms.
// All components read CSS custom properties set on the phone root by App.

const TP_FONTS = {
  inter: { label: "Inter (spec)", display: "'Inter', sans-serif", body: "'Inter', sans-serif", dWeight: 800, dSpacing: "-0.02em", dTransform: "none" },
  barlow: { label: "Barlow Cond. (athletic)", display: "'Barlow Condensed', sans-serif", body: "'Barlow', sans-serif", dWeight: 700, dSpacing: "0.01em", dTransform: "uppercase" },
  grotesk: { label: "Space Grotesk (technical)", display: "'Space Grotesk', sans-serif", body: "'IBM Plex Sans', sans-serif", dWeight: 700, dSpacing: "-0.01em", dTransform: "none" },
};

function tpTheme(t) {
  const dark = t.theme === "dark";
  const f = TP_FONTS[t.font] || TP_FONTS.inter;
  const sp = t.density === "compact" ? 0.82 : 1;
  return {
    "--accent": t.accent,
    "--accent-soft": t.accent + (dark ? "2e" : "24"),
    "--accent-text": dark ? t.accent : t.accent,
    "--bg": dark ? "#050505" : "#f6f5f3",
    "--surface": dark ? "#111111" : "#ffffff",
    "--surface2": dark ? "#1a1a1a" : "#efedea",
    "--text": dark ? "#ffffff" : "#15130f",
    "--text2": dark ? "#a3a3a3" : "#6f6a62",
    "--line": dark ? "#232323" : "#e4e1db",
    "--success": "#00D26A",
    "--danger": "#FF4D4D",
    "--font-display": f.display,
    "--font-body": f.body,
    "--dw": f.dWeight,
    "--dsp": f.dSpacing,
    "--dtr": f.dTransform,
    "--sp": sp,
  };
}

// ---------- atoms ----------

function Disp({ size = 20, children, style, color }) {
  return (
    <div style={{
      fontFamily: "var(--font-display)", fontWeight: "var(--dw)",
      letterSpacing: "var(--dsp)", textTransform: "var(--dtr)",
      fontSize: size, color: color || "var(--text)", lineHeight: 1.1, ...style,
    }}>{children}</div>
  );
}

function Body({ size = 14, dim, bold, children, style, color }) {
  return (
    <div style={{
      fontFamily: "var(--font-body)", fontSize: size,
      fontWeight: bold ? 600 : 400,
      color: color || (dim ? "var(--text2)" : "var(--text)"),
      lineHeight: 1.35, ...style,
    }}>{children}</div>
  );
}

function Num({ size = 22, children, style, color }) {
  return (
    <div style={{
      fontFamily: "var(--font-display)", fontWeight: 700, fontVariantNumeric: "tabular-nums",
      fontSize: size, color: color || "var(--text)", lineHeight: 1, letterSpacing: "-0.01em", ...style,
    }}>{children}</div>
  );
}

function Card({ children, style, onClick, accent, pad }) {
  return (
    <div onClick={onClick} style={{
      background: accent ? "var(--accent-soft)" : "var(--surface)",
      border: "1px solid " + (accent ? "transparent" : "var(--line)"),
      borderRadius: 16, padding: pad != null ? pad : "calc(14px * var(--sp))",
      cursor: onClick ? "pointer" : "default",
      transition: "transform .12s ease, background .15s",
      ...style,
    }}>{children}</div>
  );
}

function Ava({ ini, d = 36, ring }) {
  return (
    <div style={{
      width: d, height: d, flex: "0 0 " + d + "px", borderRadius: "50%",
      background: "var(--surface2)", color: "var(--text)",
      border: ring ? "2px solid var(--accent)" : "1px solid var(--line)",
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "var(--font-body)", fontWeight: 700, fontSize: d * 0.34,
    }}>{ini}</div>
  );
}

function Pill({ children, on, onClick, small }) {
  return (
    <button onClick={onClick} style={{
      border: "1px solid " + (on ? "var(--accent)" : "var(--line)"),
      background: on ? "var(--accent-soft)" : "transparent",
      color: on ? "var(--text)" : "var(--text2)",
      borderRadius: 999, padding: small ? "4px 10px" : "6px 13px",
      fontFamily: "var(--font-body)", fontSize: small ? 11.5 : 13, fontWeight: 600,
      cursor: onClick ? "pointer" : "default", whiteSpace: "nowrap",
    }}>{children}</button>
  );
}

function Btn({ children, primary, ghost, onClick, full, danger, small, style }) {
  return (
    <button onClick={onClick} style={{
      width: full ? "100%" : undefined,
      background: primary ? "var(--accent)" : danger ? "var(--danger)" : ghost ? "transparent" : "var(--surface2)",
      color: primary || danger ? "#0a0a0a" : "var(--text)",
      border: ghost ? "1px solid var(--line)" : "none",
      borderRadius: 13, padding: small ? "8px 14px" : "13px 18px",
      fontFamily: "var(--font-body)", fontWeight: 700, fontSize: small ? 13 : 15,
      cursor: "pointer", whiteSpace: "nowrap",
      transition: "filter .12s, transform .08s",
      ...style,
    }}
    onMouseDown={(e) => { e.currentTarget.style.transform = "scale(0.97)"; }}
    onMouseUp={(e) => { e.currentTarget.style.transform = "scale(1)"; }}
    onMouseLeave={(e) => { e.currentTarget.style.transform = "scale(1)"; }}
    >{children}</button>
  );
}

function Seg({ options, value, onChange }) {
  return (
    <div style={{ display: "flex", background: "var(--surface2)", borderRadius: 11, padding: 3, gap: 2 }}>
      {options.map((o) => (
        <button key={o} onClick={() => onChange(o)} style={{
          flex: 1, border: "none", borderRadius: 9, padding: "7px 4px",
          background: value === o ? "var(--surface)" : "transparent",
          color: value === o ? "var(--text)" : "var(--text2)",
          fontFamily: "var(--font-body)", fontSize: 12.5, fontWeight: 600, cursor: "pointer",
          boxShadow: value === o ? "0 1px 4px rgba(0,0,0,0.25)" : "none",
        }}>{o}</button>
      ))}
    </div>
  );
}

function Row({ children, gap = 10, style, onClick }) {
  return <div onClick={onClick} style={{ display: "flex", alignItems: "center", gap, cursor: onClick ? "pointer" : undefined, ...style }}>{children}</div>;
}

function Col({ children, gap = 10, style }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: "calc(" + gap + "px * var(--sp))", ...style }}>{children}</div>;
}

function SecHead({ children, right, onRight }) {
  return (
    <Row style={{ justifyContent: "space-between", marginTop: 4 }}>
      <Disp size={15}>{children}</Disp>
      {right && (
        <Body size={12.5} bold color="var(--accent-text)" onClick={onRight} style={{ cursor: onRight ? "pointer" : "default" }}>
          <span onClick={onRight} style={{ cursor: onRight ? "pointer" : "default" }}>{right}</span>
        </Body>
      )}
    </Row>
  );
}

// Sparkline for rank history (lower = better, so invert)
function Spark({ vals, w = 120, h = 36, stroke = 2 }) {
  const min = Math.min(...vals), max = Math.max(...vals);
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * (w - 6) + 3;
    const y = ((v - min) / (max - min || 1)) * (h - 10) + 5;
    return x + "," + y;
  });
  return (
    <svg width={w} height={h} style={{ display: "block" }}>
      <polyline points={pts.join(" ")} fill="none" stroke="var(--accent)" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"></polyline>
      <circle cx={pts[pts.length - 1].split(",")[0]} cy={pts[pts.length - 1].split(",")[1]} r="3.5" fill="var(--accent)"></circle>
    </svg>
  );
}

function Bars({ vals, h = 44, hi = -1 }) {
  const max = Math.max(...vals);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 5, height: h }}>
      {vals.map((v, i) => (
        <div key={i} style={{
          flex: 1, height: Math.max(8, (v / max) * 100) + "%", borderRadius: 5,
          background: i === hi ? "var(--accent)" : "var(--surface2)",
        }}></div>
      ))}
    </div>
  );
}

// Bottom sheet modal
function Sheet({ open, onClose, children, title }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position: "absolute", inset: 0, zIndex: 60,
      background: "rgba(0,0,0,0.55)", backdropFilter: "blur(2px)",
      display: "flex", flexDirection: "column", justifyContent: "flex-end",
      animation: "tpFade .18s ease",
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: "var(--bg)", borderRadius: "22px 22px 0 0",
        padding: "10px 18px 26px", animation: "tpUp .25s cubic-bezier(.2,.9,.3,1)",
        maxHeight: "85%", overflowY: "auto",
      }}>
        <div style={{ width: 38, height: 4.5, borderRadius: 3, background: "var(--line)", margin: "0 auto 12px" }}></div>
        {title && <Disp size={19} style={{ marginBottom: 12 }}>{title}</Disp>}
        {children}
      </div>
    </div>
  );
}

// Toast
function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div style={{
      position: "absolute", top: 64, left: "50%", transform: "translateX(-50%)",
      zIndex: 80, background: "var(--surface)", border: "1px solid var(--line)",
      color: "var(--text)", borderRadius: 999, padding: "9px 18px",
      fontFamily: "var(--font-body)", fontSize: 13, fontWeight: 600,
      boxShadow: "0 8px 30px rgba(0,0,0,0.45)", whiteSpace: "nowrap",
      animation: "tpUp .25s ease",
    }}>{msg}</div>
  );
}

// Bottom navigation + FAB
function TabBar({ tab, setTab, onFab }) {
  const items = [
    ["home", "Home", "M4 11.5 12 4l8 7.5V20a1 1 0 0 1-1 1h-4.5v-5.5h-5V21H5a1 1 0 0 1-1-1v-8.5Z"],
    ["events", "Events", "M5 5h14a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm0 5h14M9 3v4m6-4v4"],
    ["matches", "Matches", "M7 4v16M17 4v16M3 9h4m10 0h4M3 15h4m10 0h4"],
    ["rankings", "Ranks", "M5 20V10m7 10V4m7 16v-7"],
    ["profile", "Profile", "M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0"],
  ];
  return (
    <div style={{
      position: "relative", borderTop: "1px solid var(--line)", background: "var(--bg)",
      display: "flex", justifyContent: "space-around", padding: "8px 4px 6px",
    }}>
      {items.map(([id, label, d]) => (
        <button key={id} onClick={() => setTab(id)} style={{
          background: "none", border: "none", cursor: "pointer", padding: "2px 8px",
          display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
          color: tab === id ? "var(--accent-text)" : "var(--text2)",
        }}>
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
            <path d={d}></path>
          </svg>
          <span style={{ fontFamily: "var(--font-body)", fontSize: 10, fontWeight: 600 }}>{label}</span>
        </button>
      ))}
      <button onClick={onFab} title="Create match" style={{
        position: "absolute", right: 14, top: -26, width: 52, height: 52, borderRadius: "50%",
        background: "var(--accent)", border: "none", cursor: "pointer",
        boxShadow: "0 6px 20px rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center",
      }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" strokeWidth="2.6" strokeLinecap="round">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
      </button>
    </div>
  );
}

Object.assign(window, {
  TP_FONTS, tpTheme, Disp, Body, Num, Card, Ava, Pill, Btn, Seg, Row, Col,
  SecHead, Spark, Bars, Sheet, Toast, TabBar,
});

</script>
<script type="text/babel">
// ===== inlined: prototype/screens-home-events.jsx =====
// Home (match-day hero + feed) and Events screens.

function FeedItem({ post, onLike }) {
  const kindIcon = { result: "🎾", rank: "📈", badge: "🏅", join: "📅" }[post.kind] || "🎾";
  return (
    <Card>
      <Row>
        <Ava ini={post.ini} d={34}></Ava>
        <Col gap={2} style={{ flex: 1, minWidth: 0 }}>
          <Body size={13.5}>
            <b>{post.who}</b> {post.text} {post.score && <b style={{ color: "var(--accent-text)" }}>{post.score}</b>}
          </Body>
          <Body size={11.5} dim>{post.time} · {post.sub}</Body>
        </Col>
        <Body size={16}>{kindIcon}</Body>
      </Row>
      <Row gap={16} style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid var(--line)" }}>
        <Row gap={5} onClick={() => onLike(post.id)}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill={post.liked ? "var(--accent)" : "none"} stroke={post.liked ? "var(--accent)" : "var(--text2)"} strokeWidth="2">
            <path d="M12 21s-7.5-4.7-9.7-9A5.6 5.6 0 0 1 12 6.6 5.6 5.6 0 0 1 21.7 12c-2.2 4.3-9.7 9-9.7 9Z"></path>
          </svg>
          <Body size={12} bold dim={!post.liked} color={post.liked ? "var(--accent-text)" : undefined}>{post.likes + (post.liked ? 1 : 0)}</Body>
        </Row>
        <Row gap={5}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" strokeWidth="2"><path d="M21 12a8 8 0 0 1-8 8H4l2-3a8 8 0 1 1 15-5Z"></path></svg>
          <Body size={12} dim>{post.comments}</Body>
        </Row>
        <Row gap={5} style={{ marginLeft: "auto" }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" strokeWidth="2"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M12 3v13m0-13L8 7m4-4 4 4"></path></svg>
        </Row>
      </Row>
    </Card>
  );
}

function MatchDayHero({ ev, joined, onOpen, onCheckin, checkedIn }) {
  return (
    <Card accent onClick={onOpen} style={{ position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", right: -30, top: -30, width: 130, height: 130, borderRadius: "50%", background: "var(--accent-soft)" }}></div>
      <Col gap={8} style={{ position: "relative" }}>
        <Row style={{ justifyContent: "space-between" }}>
          <Body size={11.5} bold color="var(--accent-text)" style={{ letterSpacing: "0.08em" }}>TODAY · 19:00</Body>
          <Body size={11.5} dim>{ev.joined + (joined ? 1 : 0)}/{ev.max} players</Body>
        </Row>
        <Disp size={22}>{ev.title}</Disp>
        <Body size={13} dim>{ev.venue} · {ev.courts} courts · +{ev.pts} pts</Body>
        <Row style={{ justifyContent: "space-between", marginTop: 4 }}>
          <Row gap={0}>
            {["RW", "BN", "SK", "AH"].map((i, n) => (
              <div key={i} style={{ marginLeft: n ? -10 : 0 }}><Ava ini={i} d={28}></Ava></div>
            ))}
            <Body size={12} dim style={{ marginLeft: 7 }}>+{ev.joined - 4 + (joined ? 1 : 0)}</Body>
          </Row>
          {joined
            ? <Btn small primary={!checkedIn} ghost={checkedIn} onClick={(e) => { e.stopPropagation(); onCheckin(); }}>{checkedIn ? "✓ Checked in" : "Check in"}</Btn>
            : <Btn small primary onClick={(e) => { e.stopPropagation(); onOpen(); }}>Join · {rupiah(ev.fee)}</Btn>}
        </Row>
      </Col>
    </Card>
  );
}

function HomeScreen({ S, A, layout }) {
  const ev = S.events[0];
  const hero = (
    <MatchDayHero ev={ev} joined={S.joined[ev.id]} checkedIn={S.checkedIn}
      onOpen={() => A.openEvent(ev.id)} onCheckin={A.checkIn}></MatchDayHero>
  );
  const form = (
    <Row gap={8}>
      {[
        ["Streak", S.streak > 0 ? "W" + S.streak + " 🔥" : "—"],
        ["Win rate", S.winRate + "%"],
        ["Season", "#" + S.rank],
      ].map(([l, v]) => (
        <Card key={l} pad={"calc(11px * var(--sp))"} style={{ flex: 1 }}>
          <Body size={10.5} dim style={{ letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 600 }}>{l}</Body>
          <Num size={19} style={{ marginTop: 4 }}>{v}</Num>

      ))}

                <Num size={17}>{e.date}</Num>
              </Col>
              <Col gap={1}>
                <Body size={13.5} bold>{e.title}</Body>
                <Body size={11.5} dim>{e.venue.split(",")[0]} · {rupiah(e.fee)}</Body>
              </Col>
            </Row>
            {e.full && !S.joined[e.id] ? <Pill small>Full</Pill> : S.joined[e.id] ? <Pill small on>Joined</Pill> : <Body size={13} bold color="var(--accent-text)">Join →</Body>}
          </Row>
        </Card>
      ))}
    </Col>
  );
  const feed = (
    <Col gap={8}>
      <SecHead>Community</SecHead>
      {S.feed.map((p) => <FeedItem key={p.id} post={p} onLike={A.like}></FeedItem>)}
    </Col>
  );
  return (
    <Col gap={12} style={{ padding: "calc(14px * var(--sp)) 16px 90px" }}>
      <Row style={{ justifyContent: "space-between" }}>
        <Col gap={1}>
          <Body size={12.5} dim>Selamat malam,</Body>
          <Disp size={21}>Tomy 👋</Disp>
        </Col>
        <Row gap={8}>
          <div style={{ position: "relative" }}>
            <Ava ini="TS" d={36} ring></Ava>
            <div style={{ position: "absolute", top: -2, right: -2, width: 9, height: 9, borderRadius: "50%", background: "var(--accent)" }}></div>
          </div>
        </Row>
      </Row>
      {layout === "feed" ? (
        <React.Fragment>{hero}{feed}{form}{week}</React.Fragment>
      ) : (
        <React.Fragment>{hero}{form}{week}{feed}</React.Fragment>
      )}
    </Col>
  );
}

// ---------- Events ----------

function EventsScreen({ S, A }) {
  const [filter, setFilter] = React.useState("All");
  const types = ["All", "Americano", "Mexicano", "League", "King of the Hill"];
  const list = S.events.filter((e) => filter === "All" || e.type === filter);
  return (
    <Col gap={12} style={{ padding: "calc(14px * var(--sp)) 16px 90px" }}>
      <Disp size={24}>Events</Disp>
      <div style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 2 }}>
        {types.map((t) => <Pill key={t} small on={filter === t} onClick={() => setFilter(t)}>{t === "King of the Hill" ? "KOTH" : t}</Pill>)}
      </div>
      <Col gap={9}>
        {list.map((e) => (
          <Card key={e.id} onClick={() => A.openEvent(e.id)} accent={e.today}>
            <Row gap={12}>

<script type="text/babel">
// ===== inlined: prototype/app.jsx =====
// Root app: state, actions, router, live simulation, tweaks, device shell.

const TP_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "device": "phone",
  "accent": "#FF6B00",
  "font": "inter",
  "density": "comfy",
  "homeLayout": "matchday"
}/*EDITMODE-END*/;

const TP_LS_KEY = "tp_proto_v1";

function tpLoad() {
  try { return JSON.parse(localStorage.getItem(TP_LS_KEY)) || {}; } catch (e) { return {}; }
}
function tpSave(patch) {
  try { localStorage.setItem(TP_LS_KEY, JSON.stringify({ ...tpLoad(), ...patch })); } catch (e) {}
}

function TernakApp() {
  const [t, setTweak] = useTweaks(TP_TWEAK_DEFAULTS);
  const saved = React.useMemo(tpLoad, []);

  const [tab, setTab] = React.useState("home");
  const [eventOpen, setEventOpen] = React.useState(null);
  const [paying, setPaying] = React.useState(null);
  const [creating, setCreating] = React.useState(false);
  const [scorer, setScorer] = React.useState(false);
  const [share, setShare] = React.useState(null);
  const [toastMsg, setToastMsg] = React.useState(null);
  const [onboarded, setOnboarded] = React.useState(!!saved.onboarded);

  const [joined, setJoined] = React.useState(saved.joined || {});
  const [checkedIn, setCheckedIn] = React.useState(false);
  const [feed, setFeed] = React.useState(() => TP_DATA.feed.map((p) => ({ ...p, liked: (saved.liked || []).includes(p.id) })));
  const [events, setEvents] = React.useState(TP_DATA.events.map((e) => ({ ...e, live: e.id === "fri-americano" })));
  const [timeline, setTimeline] = React.useState(TP_DATA.timeline);
  const [stats, setStats] = React.useState({ matches: 47, wins: 30, streak: 3, rank: 8, rankDelta: 0, myPts: 380 });
  const [live, setLive] = React.useState({
    round: 3,
    courts: [
      { id: "c1", teamA: "Bayu / Rina", teamB: "Eko / Maya", a: 16, b: 12 },
      { id: "c2", teamA: "Tomy / Dina", teamB: "Andre / Sari", a: 14, b: 10, yours: true },
      { id: "c3", teamA: "Dimas / Fitri", teamB: "Raka / Sari", a: 9, b: 11 },
    ],
  });
  const [standings, setStandings] = React.useState([
    { name: "Rina Wijaya", ini: "RW", pts: 86 },
    { name: "Tomy Santoso", ini: "TS", pts: 81, me: true },
    { name: "Bayu Nugroho", ini: "BN", pts: 77 },
    { name: "Dina Maharani", ini: "DM", pts: 74 },
    { name: "Andre Halim", ini: "AH", pts: 69 },
  ]);
  const [matchResult, setMatchResult] = React.useState(null);

  // live simulation tick (other courts creep up while watching)
  React.useEffect(() => {
    if ((tab !== "matches" && t.device !== "ipad") || scorer) return;
    const id = setInterval(() => {
      setLive((l) => ({
        ...l,
        courts: l.courts.map((c) => {
          if (c.yours || Math.random() < 0.5) return c;
          const key = Math.random() < 0.5 ? "a" : "b";
          return { ...c, [key]: c[key] + 1 };
        }),
      }));
    }, 2600);
    return () => clearInterval(id);
  }, [tab, scorer, t.device]);

  const winRate = Math.round((stats.wins / stats.matches) * 100);
  const players = React.useMemo(() => TP_DATA.players.map((p) => (p.me ? { ...p, pts: stats.myPts } : p)), [stats.myPts]);

  const toast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2200); };

  const A = {
    setTab: (x) => { setTab(x); setEventOpen(null); },
    openEvent: (id) => { setTab("events"); setEventOpen(id); },
    back: () => setEventOpen(null),
    openPay: (id) => setPaying(id),
    closePay: () => setPaying(null),
    confirmJoin: (id) => {
      const j = { ...joined, [id]: true };
      setJoined(j); setPaying(null); tpSave({ joined: j });
      toast("Joined ✓ — pairings drop 1h before start");
    },
    checkIn: () => { setCheckedIn(true); toast("Checked in — Court 2, Round 3 🎾"); },
    like: (id) => {
      setFeed((f) => {
        const nf = f.map((p) => (p.id === id ? { ...p, liked: !p.liked } : p));
        tpSave({ liked: nf.filter((p) => p.liked).map((p) => p.id) });
        return nf;
      });
    },
    setScorer,
    scoreCourt: (courtId, side, d) => {
      setLive((l) => ({
        ...l,
        courts: l.courts.map((c) => {
          if (c.id !== courtId) return c;
          const key = side === "A" ? "a" : "b";
          return { ...c, [key]: Math.max(0, c[key] + d) };
        }),
      }));
    },
    endRound: () => {
      setLive((l) => ({
        round: l.round + 1,
        courts: [
          { id: "c1", teamA: "Rina / Andre", teamB: "Tomy / Eko", a: 0, b: 0, yours: true },
          { id: "c2", teamA: "Dina / Bayu", teamB: "Maya / Dimas", a: 0, b: 0 },
          { id: "c3", teamA: "Sari / Raka", teamB: "Fitri / Walk-in", a: 0, b: 0 },
        ],
      }));
      setStandings((s) => s.map((p) => ({ ...p, pts: p.pts + Math.floor(Math.random() * 8) + (p.me ? 6 : 0) })).sort((a, b) => b.pts - a.pts));
      toast("Round complete — new pairings sent to every phone \ud83d\udce3");
    },
    score: (side, d) => {
      setLive((l) => ({
        ...l,
        courts: l.courts.map((c) => {
          if (!c.yours) return c;
          const key = side === "A" ? "a" : "b";
          return { ...c, [key]: Math.max(0, c[key] + d) };
        }),
      }));
    },
    endMatch: () => {
      const c = live.courts.find((x) => x.yours);
      const won = c.a > c.b;
      const prevRank = stats.rank;
      const next = {
        matches: stats.matches + 1,
        wins: stats.wins + (won ? 1 : 0),
        streak: won ? stats.streak + 1 : 0,
        rank: won && stats.rank === 8 ? 7 : stats.rank,
        rankDelta: won && stats.rank === 8 ? 1 : stats.rankDelta,
        myPts: stats.myPts + (won ? 19 : 2),
      };
      setStats(next);
      setMatchResult({ won, a: c.a, b: c.b, prevRank });
      const score = c.a + "–" + c.b;
      setTimeline((tl) => [
        ...(won && next.rank < prevRank ? [{ id: "tl-rank-" + Date.now(), kind: "rank", title: "Moved up to Rank #" + next.rank, sub: "Season 3 · just now", pts: "↑1" }] : []),
        { id: "tl-" + Date.now(), kind: won ? "W" : "L", title: (won ? "Won " : "Lost ") + score + " vs Andre / Sari", sub: "Friday Night Americano · just now", pts: won ? "+12" : "+2" },
        ...tl,
      ]);
      setFeed((f) => [
        { id: "f-" + Date.now(), who: "Tomy Santoso", ini: "TS", time: "now", kind: "result", text: won ? "defeated Andre / Sari" : "fell to Andre / Sari", score, sub: "Friday Night Americano · " + (won ? "+12" : "+2") + " pts", likes: 0, comments: 0 },
        ...f,
      ]);
      setStandings((s) => s.map((p) => (p.me ? { ...p, pts: p.pts + (won ? 12 : 2) } : p)).sort((a, b) => b.pts - a.pts));
    },
    closeScorer: () => {
      setScorer(false); setMatchResult(null);
      setLive((l) => ({ ...l, round: l.round + 1, courts: l.courts.map((c) => (c.yours ? { ...c, a: 0, b: 0, teamA: "Tomy / Rina", teamB: "Bayu / Maya" } : c)) }));
    },
    openShare: (kind) => setShare(kind),
    closeShare: () => setShare(null),
    setCreating,
    createEvent: (name, format, courts, max) => {
      setEvents((evs) => [...evs, {
        id: "ev-" + Date.now(), title: name, type: format, day: "SEN", date: "16",
        dateLong: "Senin, 16 Juni · 19:00", venue: "Padel Pro SCBD", courts, fee: 100000,
        pts: 10, max, joined: 1, desc: "Created by you. Smart matchmaking will balance pairings as players register.",
        roster: [],
      }]);
      setCreating(false); setTab("events");
      toast("Event created — registration open 📣");
    },
    finishOnboarding: () => { setOnboarded(true); tpSave({ onboarded: true }); },
    toast,
  };

  const S = { ...stats, winRate, joined, checkedIn, feed, events, timeline, live, standings, scorer, share, paying, creating, matchResult, players, rankHistory: TP_DATA.rankHistory.slice(0, 11).concat([stats.rank]), badgesGot: 3 + (stats.streak >= 10 ? 1 : 0) };

  const ev = events.find((e) => e.id === eventOpen);
  const dark = t.theme === "dark";
  const isPad = t.device === "ipad";

  // scale device to viewport
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const dw = isPad ? 1194 + 32 : 402, dh = isPad ? 834 + 32 : 874;
    const fit = () => setScale(Math.min(1, (window.innerHeight - 56) / dh, (window.innerWidth - 48) / dw));
    fit(); window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  }, [isPad]);

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column", gap: 14, alignItems: "center", justifyContent: "center",
      background: dark ? "#0c0c0d" : "#e8e6e1", transition: "background .3s",
    }}>
      <div style={{ display: "flex", background: dark ? "#1c1c1e" : "#fff", borderRadius: 999, padding: 4, gap: 3, boxShadow: "0 2px 12px rgba(0,0,0,0.18)" }}>
        {[["phone", "\ud83d\udcf1 Player app"], ["ipad", "\u25ad iPad host console"]].map(([id, label]) => (
          <button key={id} onClick={() => setTweak("device", id)} style={{
            border: "none", borderRadius: 999, padding: "7px 16px", cursor: "pointer",
            fontFamily: "'Inter', sans-serif", fontSize: 12.5, fontWeight: 600,
            background: t.device === id ? t.accent : "transparent",
            color: t.device === id ? "#0a0a0a" : dark ? "#a3a3a3" : "#6f6a62",
          }}>{label}</button>
        ))}
      </div>
      <div style={{ transform: "scale(" + scale + ")", transformOrigin: "center top" }}>
        {isPad ? (
          <IPadFrame dark={dark}>
            <HostConsole S={S} A={A} t={t}></HostConsole>
          </IPadFrame>
        ) : (
        <IOSDevice dark={dark}>
          <div style={{ ...tpTheme(t), background: "var(--bg)", height: "100%", display: "flex", flexDirection: "column", position: "relative" }}>
            <div style={{ height: 54, flex: "0 0 54px" }}></div>
            <div style={{ flex: 1, overflowY: "auto", position: "relative" }}>
              {tab === "home" && <HomeScreen S={S} A={A} layout={t.homeLayout}></HomeScreen>}
              {tab === "events" && !ev && <EventsScreen S={S} A={A}></EventsScreen>}
              {tab === "events" && ev && <EventDetail S={S} A={A} ev={ev}></EventDetail>}
              {tab === "matches" && <MatchesScreen S={S} A={A}></MatchesScreen>}
              {tab === "rankings" && <RankingsScreen S={S}></RankingsScreen>}
              {tab === "profile" && <ProfileScreen S={S} A={A}></ProfileScreen>}
            </div>
            <TabBar tab={tab} setTab={A.setTab} onFab={() => setCreating(true)}></TabBar>
            <div style={{ height: 22, flex: "0 0 22px", background: "var(--bg)" }}></div>
            <PaySheet S={S} A={A}></PaySheet>
            <CreateSheet S={S} A={A}></CreateSheet>
            <ScorerOverlay S={S} A={A}></ScorerOverlay>
            <ShareOverlay S={S} A={A}></ShareOverlay>
            {!onboarded && <Onboarding A={A}></Onboarding>}
            <Toast msg={toastMsg}></Toast>
          </div>
        </IOSDevice>
        )}
      </div>

      <TweaksPanel>
        <TweakSection label="Theme"></TweakSection>
        <TweakRadio label="Mode" value={t.theme} options={["dark", "light"]} onChange={(v) => setTweak("theme", v)}></TweakRadio>
        <TweakColor label="Accent" value={t.accent} options={["#FF6B00", "#C4F22E", "#2EAEFF", "#FF3D71"]} onChange={(v) => setTweak("accent", v)}></TweakColor>
        <TweakSection label="Typography"></TweakSection>
        <TweakSelect label="Type pairing" value={t.font} options={Object.keys(TP_FONTS).map((k) => ({ value: k, label: TP_FONTS[k].label }))} onChange={(v) => setTweak("font", v)}></TweakSelect>
        <TweakSection label="Layout"></TweakSection>
        <TweakRadio label="Device" value={t.device} options={[{ value: "phone", label: "Phone" }, { value: "ipad", label: "iPad host" }]} onChange={(v) => setTweak("device", v)}></TweakRadio>
        <TweakRadio label="Home order" value={t.homeLayout} options={["matchday", "feed"]} onChange={(v) => setTweak("homeLayout", v)}></TweakRadio>
        <TweakRadio label="Density" value={t.density} options={["comfy", "compact"]} onChange={(v) => setTweak("density", v)}></TweakRadio>
        <TweakSection label="Demo"></TweakSection>
        <TweakButton label="Replay onboarding" onClick={() => { setOnboarded(false); }}></TweakButton>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TernakApp></TernakApp>);

</script>
</body>
</html>
