name: Deploy Edge Functions

# Redeploys the Supabase edge functions. Runs automatically when a function
# changes on main, and can be run on demand from the Actions tab ("Run workflow").
# Requires repo secret: SUPABASE_ACCESS_TOKEN (a Supabase personal access token).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: qsgwtjcrgedjbjsbibxr
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy create-invoice
        run: supabase functions deploy create-invoice --project-ref "$PROJECT_REF"
      - name: Deploy xendit-webhook
        run: supabase functions deploy xendit-webhook --project-ref "$PROJECT_REF" --no-verify-jwt
      - name: Deploy send-otp-whatsapp
        run: supabase functions deploy send-otp-whatsapp --project-ref "$PROJECT_REF" --no-verify-jwt
