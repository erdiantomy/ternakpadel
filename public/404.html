  <title>Ternak Padel</title>
  <script>
    // SPA fallback for GitHub Pages: remember the deep path, bounce to root,
    // index.html restores it before the app bundle reads the URL.
    sessionStorage.setItem("spa_redirect", location.pathname + location.search + location.hash);
    location.replace("/");
  </script>
