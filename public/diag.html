<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ternak Padel — Auth Diagnostic</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background:#0c0c0d; color:#eee; margin:0; padding:20px; }
    h1 { font-size:18px; margin:0 0 4px; }
    p { font-size:13px; color:#9a9a9a; line-height:1.45; }
    input, button { font-size:16px; padding:13px; border-radius:11px; border:1px solid #444; background:#1a1a1c; color:#fff; width:100%; box-sizing:border-box; margin:6px 0; }
    button { background:#FF6B00; border:none; font-weight:700; cursor:pointer; }
    pre { white-space:pre-wrap; word-break:break-word; background:#111; border:1px solid #333; border-radius:11px; padding:14px; font-size:13px; min-height:80px; margin-top:10px; }
    .ok { color:#46d369; } .bad { color:#ff6b6b; }
  </style>
</head>
<body>
  <h1>🎾 Auth diagnostic</h1>
  <p>Type your WhatsApp number, tap <b>2</b>, then <b>screenshot the black box</b> and send it. This bypasses the app and your browser cache and shows the raw server response.</p>
  <input id="phone" placeholder="081234567890" />
  <button onclick="ping()">1 · Ping Supabase (is it reachable?)</button>
  <button onclick="sendOtp()">2 · Test OTP send (the real test)</button>
  <pre id="out">ready.</pre>
  <script>
    var SB_URL = "https://qsgwtjcrgedjbjsbibxr.supabase.co";
    var SB_KEY = "sb_publishable_V3fEy78NJsVyztWQ-gqPMw_Sjj-o5Zu";
    var out = document.getElementById("out");
    function show(t, cls) { out.className = cls || ""; out.textContent = t; }
    function norm(raw) {
      var p = (raw || "").replace(/[\s\-().]/g, "");
      if (p.indexOf("08") === 0) p = "+62" + p.slice(1);
      else if (p.indexOf("62") === 0) p = "+" + p;
      else if (p.charAt(0) !== "+") p = "+62" + p;
      return p;
    }
    async function ping() {
      show("pinging " + SB_URL + " ...");
      try {
        var t0 = Date.now();
        var r = await fetch(SB_URL + "/auth/v1/health", { headers: { apikey: SB_KEY } });
        var body = await r.text();
        show("HEALTH " + r.status + "  (" + (Date.now() - t0) + "ms)\n" + body, r.ok ? "ok" : "bad");
      } catch (e) { show("FETCH FAILED (network / CORS):\n" + e, "bad"); }
    }
    async function sendOtp() {
      var phone = norm(document.getElementById("phone").value);
      show("requesting OTP for " + phone + " ...");
      try {
        var t0 = Date.now();
        var r = await fetch(SB_URL + "/auth/v1/otp", {
          method: "POST",
          headers: { apikey: SB_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ phone: phone, create_user: true })
        });
        var body = await r.text();
        show("OTP endpoint: HTTP " + r.status + "  (" + (Date.now() - t0) + "ms)\nphone = " + phone + "\n\n" + body, r.ok ? "ok" : "bad");
      } catch (e) { show("FETCH FAILED (network / CORS / timeout):\n" + e, "bad"); }
    }
  </script>
</body>
</html>
